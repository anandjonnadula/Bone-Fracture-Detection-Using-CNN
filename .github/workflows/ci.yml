name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # 3.13 to match the pinned deps: numpy 2.5 / scipy 1.18 need Python >= 3.12.
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - name: Fast suite (no TensorFlow model loads)
        run: pytest -m "not model"
      - name: Model smoke tests (models are committed, so this works)
        run: pytest -m model

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t bfd .
