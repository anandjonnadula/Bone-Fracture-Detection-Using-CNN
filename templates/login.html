{% extends "base.html" %}
{% block title %}Login | Bone Fracture Detection{% endblock %}

{% block content %}
<div class="auth-page-bg" style="flex: 1;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="color: #0c4a6e; font-size: 1.875rem; font-weight: 800; letter-spacing: -0.025em;">Bone Fracture Detection</h1>
        <p style="color: #64748b; font-weight: 500; font-size: 0.95rem;">Automated Radiographic Analysis System</p>
    </div>

    <div class="card medical-card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <h2 class="panel-title" style="text-align: center; margin-bottom: 2rem; font-size: 1.25rem; font-weight: 700; border: none;">Login</h2>

        <form method="POST" action="{{ url_for('login') }}" style="display: flex; flex-direction: column; gap: 1.25rem;">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input id="username" type="text" name="username" class="form-input" required autocomplete="username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input id="password" type="password" name="password" class="form-input" required autocomplete="current-password" placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-size: 0.95rem; margin-top: 0.5rem; font-weight: 600; border-radius: 10px;">Login</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: #64748b;">
            New patient? <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none; font-weight: 700;">Create Account</a>
        </div>

        <div style="text-align: center; margin-top: 2.5rem; padding-top: 1rem; border-top: 1px dashed #e2e8f0;">
            <a href="{{ url_for('register_clinical') }}" style="color: #94a3b8; font-size: 0.75rem; text-decoration: none; opacity: 0.4; transition: opacity 0.3s; font-weight: 500;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.4'">Doctor/Staff Enrollment</a>
        </div>
    </div>
</div>
{% endblock %}
