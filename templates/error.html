{% extends "base.html" %}
{% block title %}Error {{ code }} | Bone Fracture Detection{% endblock %}

{% block content %}
<main class="app-layout" style="display: flex; align-items: center; justify-content: center; min-height: 50vh;">
    <div class="card text-center" style="max-width: 440px;">
        <div style="font-size: 3.5rem; font-weight: 800; color: var(--primary); line-height: 1;">{{ code }}</div>
        <h1 style="font-size: 1.25rem; font-weight: 700; color: var(--text-dark); margin: 1rem 0 0.5rem;">
            {{ 'Page Not Found' if code == 404 else 'Server Error' }}
        </h1>
        <p style="color: var(--text-light); font-size: 0.9rem; margin-bottom: 1.5rem;">{{ message }}</p>
        <a href="{{ url_for('index') }}" class="btn btn-primary">Back to Home</a>
    </div>
</main>
{% endblock %}
