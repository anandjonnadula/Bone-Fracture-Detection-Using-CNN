{% extends "base.html" %}
{% block title %}Patient Registration | Bone Fracture Detection{% endblock %}

{% block content %}
<div class="auth-page-bg" style="flex: 1;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="color: #0f766e; font-size: 1.875rem; font-weight: 800; letter-spacing: -0.025em;">Create Patient Account</h1>
        <p style="color: #64748b; font-weight: 500; font-size: 0.95rem;">Register to upload scans and track your diagnostic records</p>
    </div>

    <div class="card medical-card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <form method="POST" action="{{ url_for('register') }}" style="display: flex; flex-direction: column; gap: 1.25rem;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input id="username" type="text" name="username" class="form-input" required minlength="3" autocomplete="username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input id="password" type="password" name="password" class="form-input" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters">
                <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 0.4rem;">Minimum 8 characters.</p>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-size: 0.95rem; font-weight: 600; border-radius: 10px;">Create Account</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.875rem; color: #64748b;">
            Already registered? <a href="{{ url_for('login') }}" style="color: var(--primary); text-decoration: none; font-weight: 700;">Login</a>
        </div>
    </div>
</div>
{% endblock %}
