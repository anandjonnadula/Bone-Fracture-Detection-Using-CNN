{% extends "base.html" %}
{% block title %}Upload Scan | Bone Fracture Detection{% endblock %}

{% block content %}
<main class="app-layout" style="max-width: 860px;">

        <!-- SCAN UPLOAD -->
        <div class="card">
            <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap;">
                <div>
                    <h2 class="panel-title">Initiate Diagnostic Scan</h2>
                    <p style="color: var(--text-light); font-size: 0.875rem; margin-top: 0.2rem;">
                        Upload a radiograph (X-ray) for automated fracture detection and severity analysis.
                    </p>
                </div>
                <span class="badge badge-neutral">System Ready</span>
            </div>

            <form action="{{ url_for('predict') }}" method="post" enctype="multipart/form-data" onsubmit="return submitForm()">

                <label id="uploadZone" class="upload-zone" style="display: block;">
                    <input id="fileInput" type="file" name="file" accept="image/jpeg,image/png" class="hidden" onchange="handleFileSelect(event)" required>
                    <svg class="upload-icon" style="width: 48px; height: 48px; margin: 0 auto 1rem; display:block;" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"></path></svg>
                    <div class="upload-text">Browse files or drag and drop</div>
                    <div class="upload-subtext">JPG or PNG · up to 15 MB</div>
                </label>
                <div id="uploadError" class="upload-error hidden" role="alert"></div>

                <div id="previewPanel" class="hidden" style="border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 1.5rem; background: var(--bg-main);">
                    <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                        <div class="scan-viewer" style="width: 140px; height: 140px; flex-shrink: 0;">
                            <img id="previewImage" src="" alt="Preview of the selected X-ray" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div style="flex: 1; min-width: 200px; display: flex; flex-direction: column; justify-content: center;">
                            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem;">
                                <svg width="20" height="20" fill="none" stroke="var(--success)" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <span style="font-weight: 600; color: var(--text-dark);">File ready for processing</span>
                            </div>
                            <div id="fileName" style="color: var(--text-light); font-size: 0.875rem; font-family: monospace; background: var(--bg-card); padding: 0.4rem 0.8rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); margin-bottom: 1rem; word-break: break-all;">
                                filename.jpg
                            </div>
                            <div>
                                <button type="button" class="btn btn-secondary" onclick="removeFile()" style="padding: 0.4rem 1rem; font-size: 0.75rem;">Remove File</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem; display: flex; justify-content: flex-end;">
                    <button type="submit" id="btnSubmit" class="btn btn-primary">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Run Clinical Analysis
                    </button>
                    <button type="button" id="btnLoading" class="btn btn-primary hidden" disabled style="opacity: 0.8; cursor: not-allowed;">
                        <div class="spinner" style="width: 16px; height: 16px; border-width: 2px;"></div>
                        Processing Neural Network...
                    </button>
                </div>
            </form>
        </div>
</main>
{% endblock %}
